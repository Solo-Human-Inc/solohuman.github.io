<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>solohuman</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #fafafa;
      color: #1a1a1a;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    h1 {
      font-size: 3rem;
      font-weight: 300;
      letter-spacing: 0.08em;
      margin-bottom: 1.5rem;
    }

    .typewriter {
      font-size: 1.25rem;
      font-weight: 400;
      color: #555;
      overflow: hidden;
      white-space: nowrap;
      border-right: 2px solid #555;
      width: 0;
      animation:
        typing 1.8s steps(12) 0.8s forwards,
        blink-caret 0.6s step-end infinite;
    }

    @keyframes typing {
      from { width: 0; }
      to { width: 12ch; }
    }

    @keyframes blink-caret {
      0%, 100% { border-color: #555; }
      50% { border-color: transparent; }
    }
  </style>
</head>
<body>
  <h1>solohuman</h1>
  <p class="typewriter">Coming soon.</p>
</body>
</html>
